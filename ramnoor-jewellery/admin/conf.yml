backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    files:
      - label: "All Products"
        name: "products"
        file: "data/products.json"
        fields:
          - label: "Products"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "number" }
              - { label: "Image", name: "image", widget: "image" }
              - { 
                  label: "Category",
                  name: "category",
                  widget: "select",
                  options: ["jumka","bangles","necklace","ring","earring","bracelet"]
                }